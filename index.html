        // Functions for Filtering and Rendering
        const dynamicSections = document.getElementById('dynamic-sections');
        const searchInput = document.getElementById('searchInput');
        const bhkFilter = document.getElementById('bhkFilter');
        const locationFilter = document.getElementById('locationFilter');

        function createCard(v) {
            // This pulls the number (like 25) out of the old "villa-detail/25.html" link
            const realId = v.url.replace('villa-detail/', '').replace('.html', '');
            
            return `
                <a href="villa.html?id=${realId}" class="villa-card group block shrink-0">
                    <div class="bg-white rounded-xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-lg transition-all duration-300 h-full flex flex-col">
                        <div class="relative h-56 overflow-hidden bg-gray-100">
                            <!-- Try exact path, fallback to placeholder if running locally without images -->
                            <img src="${v.img}" onerror="this.src='https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400'" alt="${v.title}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="font-bold text-gray-800 text-[15px] leading-tight mb-2 line-clamp-2">${v.title}</h3>
                            
                            <div class="flex items-center gap-1 text-blue-500 text-xs font-semibold mb-3 uppercase tracking-wider">
                                <i class="fa-solid fa-location-dot"></i> ${v.loc}
                            </div>
                            
                            <div class="flex flex-col gap-2 mt-auto pt-3 border-t border-gray-100">
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-500 text-[11px] font-medium uppercase">Weekdays</span>
                                    <span class="text-gray-800 font-bold text-[15px]">₹${v.priceWd}</span>
                                </div>
                                <div class="flex justify-between items-center bg-red-50 px-2 py-1 rounded">
                                    <span class="text-red-500 text-[11px] font-bold uppercase">Weekends</span>
                                    <span class="text-red-600 font-bold text-[15px]">₹${v.priceWe}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }        function renderVillas() {
            const search = searchInput.value.toLowerCase();
            const bhkVal = bhkFilter.value;
            const locVal = locationFilter.value.toLowerCase();

            // Filter data
            const filtered = villas.filter(v => {
                const matchSearch = v.title.toLowerCase().includes(search) || v.loc.toLowerCase().includes(search);
                const matchBhk = bhkVal === 'All' || v.bhk.toString() === bhkVal;
                const matchLoc = locVal === 'all' || v.loc.toLowerCase().includes(locVal);
                return matchSearch && matchBhk && matchLoc;
            });

            // Group by BHK
            const grouped = filtered.reduce((acc, v) => {
                if (!acc[v.bhk]) acc[v.bhk] = [];
                acc[v.bhk].push(v);
                return acc;
            }, {});

            // Generate HTML
            dynamicSections.innerHTML = '';
            
            if(Object.keys(grouped).length === 0) {
                dynamicSections.innerHTML = `
                    <div class="text-center py-20 text-gray-500">
                        <i class="fa-solid fa-magnifying-glass text-4xl mb-4 opacity-30"></i>
                        <p class="text-lg">No villas found matching your filters.</p>
                        <button onclick="clearFilters()" class="text-blue-500 mt-2 hover:underline">Clear Filters</button>
                    </div>`;
                return;
            }

            // Sort keys numerically (1, 2, 3... 12)
            const sortedBhkKeys = Object.keys(grouped).sort((a, b) => Number(a) - Number(b));

            sortedBhkKeys.forEach(bhk => {
                const sectionHtml = `
                    <section class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-50">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-3">
                                <h2 class="serif text-2xl md:text-3xl font-bold text-gray-800">${bhk} BHK Luxury Villas</h2>
                                <span class="bg-gray-800 text-white text-[10px] px-2 py-1 rounded font-bold tracking-wider">${grouped[bhk].length} Properties</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="scrollSection('carousel-${bhk}', -1)" class="w-8 h-8 md:w-10 md:h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 text-gray-500 hover:text-gray-800 transition"><i class="fa-solid fa-chevron-left"></i></button>
                                <button onclick="scrollSection('carousel-${bhk}', 1)" class="w-8 h-8 md:w-10 md:h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 text-gray-500 hover:text-gray-800 transition"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div id="carousel-${bhk}" class="scroll-container flex gap-4 md:gap-6 overflow-x-auto no-scrollbar pb-4 pt-2">
                            ${grouped[bhk].map(v => createCard(v)).join('')}
                        </div>
                    </section>
                `;
                dynamicSections.innerHTML += sectionHtml;
            });
        }

        // Horizontal Scrolling Logic
        window.scrollSection = function(id, direction) {
            const container = document.getElementById(id);
            if (container) {
                // Scroll width of one card + gap
                const scrollAmount = (window.innerWidth > 768 ? 370 : 320) * direction;
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        window.clearFilters = function() {
            searchInput.value = '';
            bhkFilter.value = 'All';
            locationFilter.value = 'All';
            renderVillas();
        }

        // Attach listeners for Instant Filtering
        searchInput.addEventListener('input', renderVillas);
        bhkFilter.addEventListener('change', renderVillas);
        locationFilter.addEventListener('change', renderVillas);

        // Initial Render
        renderVillas();

    </script>
</body>
</html>
