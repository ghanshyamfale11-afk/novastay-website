<div class="bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] p-6 w-full max-w-[360px] font-sans border border-gray-100">
    
    <div class="flex items-baseline gap-1 mb-6">
        <h2 class="text-3xl font-extrabold text-gray-900" id="headerPrice">₹2500</h2>
        <span class="text-sm text-gray-500 font-medium">/ weekday</span>
    </div>

    <div class="flex gap-3 mb-4">
        <div class="flex-1 border border-gray-200 rounded-lg p-2 focus-within:border-gray-400 transition">
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wide">Check-in</label>
            <input type="date" id="checkIn" class="w-full text-sm font-semibold outline-none text-gray-800 bg-transparent cursor-pointer">
        </div>
        <div class="flex-1 border border-gray-200 rounded-lg p-2 focus-within:border-gray-400 transition">
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wide">Check-out</label>
            <input type="date" id="checkOut" class="w-full text-sm font-semibold outline-none text-gray-800 bg-transparent cursor-pointer">
        </div>
    </div>

    <div class="border border-gray-200 rounded-lg p-2 mb-6 flex justify-between items-center focus-within:border-gray-400 transition">
        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wide">Total Guests</label>
        <div class="flex items-center gap-2">
            <input type="number" id="pax" min="1" value="1" class="w-12 text-right text-sm font-bold outline-none text-gray-800 bg-transparent">
            <span class="text-xs text-gray-500 font-medium">Pax</span>
        </div>
    </div>

    <div class="space-y-2 mb-6" id="priceBreakdown">
        
        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
            <span class="text-sm font-medium text-gray-600" id="wdLabel">Weekday</span>
            <span class="text-sm font-bold text-gray-900" id="wdTotal">₹2500</span>
        </div>
        
        <div class="flex justify-between items-center bg-red-50 p-3 rounded-lg border border-red-100">
            <span class="text-sm font-medium text-red-500" id="weLabel">Weekend</span>
            <span class="text-sm font-bold text-red-500" id="weTotal">₹5500</span>
        </div>

        <div class="flex justify-between items-center bg-blue-50 p-3 rounded-lg border border-blue-100 hidden" id="extraGuestRow">
            <span class="text-sm font-medium text-blue-600" id="extraGuestLabel">Extra Guests (0)</span>
            <span class="text-sm font-bold text-blue-600" id="extraGuestTotal">₹0</span>
        </div>

        <div id="totalsSection" class="hidden">
            <div class="flex justify-between items-center pt-4 pb-2 border-t border-gray-100 mt-2">
                <span class="text-base font-bold text-gray-800">Grand Total</span>
                <span class="text-lg font-extrabold text-gray-900" id="grandTotal">₹0</span>
            </div>
            <div class="flex justify-between items-center pb-2">
                <span class="text-xs font-bold text-purple-600 uppercase tracking-wide">60% Advance Payable</span>
                <span class="text-sm font-extrabold text-purple-700" id="advanceTotal">₹0</span>
            </div>
        </div>
    </div>

    <div class="space-y-3">
        <button class="w-full bg-[#4ADE80] hover:bg-[#22c55e] text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition shadow-sm">
            <i class="fa-brands fa-whatsapp text-lg"></i> Check Availability
        </button>
        <button class="w-full bg-[#6D28D9] hover:bg-[#5b21b6] text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition shadow-sm">
            <i class="fa-solid fa-qrcode"></i> Pay 60% Booking Advance
        </button>
        <button class="w-full border-2 border-gray-800 text-gray-800 hover:bg-gray-50 font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition">
            <i class="fa-solid fa-share-nodes"></i> Share Villa
        </button>
    </div>
    
    <p class="text-[9px] text-center text-gray-400 font-bold uppercase tracking-wider mt-5">100% Booking amount required</p>
</div>
