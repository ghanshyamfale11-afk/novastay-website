    document.getElementById('folderInput').addEventListener('change', function(e) {
        const files = e.target.files;
        let htmlFiles = [];
        
        // Filter only HTML files
        for (let i = 0; i < files.length; i++) {
            if (files[i].name.endsWith('.html')) {
                htmlFiles.push(files[i]);
            }
        }

        if (htmlFiles.length === 0) {
            alert("No HTML files found in this folder!");
            return;
        }

        let processedCount = 0;
        let galleryData = {};

        htmlFiles.forEach(file => {
            const villaId = file.name.replace('.html', '');
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const text = e.target.result;
                
                // This regex finds the exact image paths you use for the gallery in your old code
                const regex = /href="\.\.\/(public\/(?:villa|gallery)\/[^"]+\.(?:jpg|png|jpeg|webp))/gi;
                let match;
                let images = [];
                
                while ((match = regex.exec(text)) !== null) {
                    images.push(match[1]); // Grabs "public/villa/image.jpg"
                }

                // Remove duplicate images
                images = [...new Set(images)];

                if (images.length > 0) {
                    galleryData[villaId] = images;
                }
                
                processedCount++;
                if (processedCount === htmlFiles.length) {
                    generateFinalCode(galleryData);
                }
            };
            reader.readAsText(file);
        });
    });

    function generateFinalCode(galleryData) {
        // Merge the gallery data into our base villas array
        const updatedVillas = baseVillas.map(v => {
            if (galleryData[v.id]) {
                v.gallery = galleryData[v.id];
            }
            return v;
        });

        // Format it nicely so it looks like code
        const codeString = "const villas = " + JSON.stringify(updatedVillas, null, 4) + ";";
        document.getElementById('outputCode').value = codeString;
        alert("Done! Check the text box for your final code.");
    }
